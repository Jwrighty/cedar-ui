name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required for npm Trusted Publishing (OIDC): GitHub mints a short-lived
  # id-token that npm exchanges for publish auth — no long-lived NPM_TOKEN.
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # OIDC trusted publishing needs npm >= 11.5.1. Node 22 bundles npm 10.x,
      # and self-upgrading it in place (`npm install -g npm@latest`) intermittently
      # corrupts the global install by pruning bundled deps like `sigstore`, which
      # breaks provenance publishing (MODULE_NOT_FOUND). Node 24 (Active LTS)
      # bundles npm 11.x natively, so no self-upgrade is needed — `pnpm publish`
      # shells out to this npm and it already understands OIDC.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # changesets/action opens (or updates) a "Version Packages" PR when there
      # are pending changesets, and runs `pnpm release` to publish when that PR
      # is merged and no changesets remain. Publish auth comes from OIDC — each
      # package must have a Trusted Publisher configured on npmjs.com pointing at
      # this repo + workflow. The very first publish of a new package cannot use
      # OIDC and is done by hand (see docs/RELEASING.md).
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Attach build provenance to the published packages (shows the
          # verified-provenance badge on npm).
          NPM_CONFIG_PROVENANCE: "true"
