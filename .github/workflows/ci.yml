name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first: @jwrighty/cedar-react typechecks and tests against the
      # compiled @jwrighty/cedar-tokens output, so the packages must be built
      # before the
      # downstream checks can resolve them.
      - name: Build packages
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  chromatic:
    name: Visual regression (Chromatic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic needs full git history to compare against the baseline.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Stories live in packages/react and import the built token CSS, so the
      # packages must be built before Storybook can render them.
      - name: Build packages
        run: pnpm build

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/docs
          buildScriptName: build
          exitZeroOnChanges: true
          # Builds on main auto-advance the baseline so already-merged global
          # changes (e.g. a Storybook decorator) don't surface as phantom diffs
          # on later PRs. PR builds still show diffs for an optional glance.
          autoAcceptChanges: main

      # Surface the published Storybook so a reviewer can open it straight from
      # the run summary — this is Cedar's public front door (ADR-0007).
      - name: Publish hosted Storybook URL
        if: always() && steps.chromatic.outputs.storybookUrl != ''
        run: |
          {
            echo "### 📖 Hosted Storybook"
            echo ""
            echo "- Published: ${{ steps.chromatic.outputs.storybookUrl }}"
            echo "- This build: ${{ steps.chromatic.outputs.buildUrl }}"
          } >> "$GITHUB_STEP_SUMMARY"
